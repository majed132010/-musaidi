<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساعدي — أبو أمجد</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --text: #1a1a18;
    --text2: #6b6a65;
    --accent: #5b4fcf;
    --accent-bg: #eeedfe;
    --accent-text: #3c3489;
    --success: #1d9e75;
    --success-bg: #e1f5ee;
    --warn: #ba7517;
    --warn-bg: #faeeda;
    --danger: #a32d2d;
    --danger-bg: #fcebeb;
    --radius: 10px;
  }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title { font-size: 17px; font-weight: 600; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .badge-accent { background: var(--accent-bg); color: var(--accent-text); }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr 300px;
    gap: 0;
    flex: 1;
    height: calc(100vh - 57px);
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.05em;
    padding: 8px 8px 4px;
    text-transform: uppercase;
  }
  .project-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: right;
    color: var(--text);
    font-size: 13.5px;
    transition: background 0.15s;
  }
  .project-item:hover { background: var(--bg); }
  .project-item.active { background: var(--accent-bg); color: var(--accent-text); }
  .project-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .project-count {
    margin-right: auto;
    font-size: 11px;
    background: var(--border);
    color: var(--text2);
    padding: 1px 7px;
    border-radius: 20px;
  }

  /* Main */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; }
  .stat-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* Tasks */
  .tasks-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .tasks-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .tasks-title { font-size: 14px; font-weight: 600; }
  .add-btn {
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .add-btn:hover { background: var(--bg); }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .task-item:hover { border-color: var(--accent); }
  .task-check {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 1px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    transition: all 0.15s;
  }
  .task-check.done { background: var(--success); border-color: var(--success); color: white; }
  .task-content { flex: 1; }
  .task-title { font-size: 13.5px; font-weight: 500; margin-bottom: 4px; }
  .task-title.done { text-decoration: line-through; color: var(--text2); font-weight: 400; }
  .task-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .tag-high { background: var(--danger-bg); color: var(--danger); }
  .tag-mid { background: var(--warn-bg); color: var(--warn); }
  .tag-low { background: var(--success-bg); color: var(--success); }
  .tag-project { background: var(--accent-bg); color: var(--accent-text); }

  /* Add Task Form */
  .add-form {
    background: var(--accent-bg);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    display: none;
  }
  .add-form.visible { display: block; }
  .add-form input, .add-form select {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    margin-bottom: 8px;
    outline: none;
  }
  .add-form input:focus, .add-form select:focus { border-color: var(--accent); }
  .form-row { display: flex; gap: 8px; }
  .form-row select { flex: 1; }
  .form-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn-save {
    padding: 7px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-cancel {
    padding: 7px 12px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    color: var(--text2);
  }

  /* Chat Panel */
  .chat-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .chat-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ai-dot {
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 85%;
    padding: 9px 12px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
  }
  .msg-ai {
    background: var(--accent-bg);
    color: var(--accent-text);
    border-radius: 12px 12px 12px 4px;
    align-self: flex-start;
  }
  .msg-user {
    background: var(--accent);
    color: white;
    border-radius: 12px 12px 4px 12px;
    align-self: flex-end;
  }
  .msg-thinking {
    background: var(--bg);
    color: var(--text2);
    border-radius: 12px 12px 12px 4px;
    align-self: flex-start;
    font-style: italic;
  }
  .chat-input-area {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 38px;
    max-height: 120px;
    background: var(--bg);
    color: var(--text);
    line-height: 1.4;
  }
  .chat-input:focus { border-color: var(--accent); background: var(--surface); }
  .send-btn {
    width: 36px; height: 36px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.88; }
  .send-btn:disabled { opacity: 0.4; cursor: default; }

  /* Quick prompts */
  .quick-prompts {
    padding: 0 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .quick-btn {
    font-size: 11.5px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: none;
    cursor: pointer;
    color: var(--text2);
    text-align: right;
    font-family: inherit;
    transition: all 0.15s;
  }
  .quick-btn:hover { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">مساعدي</div>
    <div class="header-sub">أبو أمجد — مركز إدارة المشاريع</div>
  </div>
  <div class="header-right">
    <span class="badge badge-accent" id="date-badge"></span>
  </div>
</div>

<div class="layout">

  <!-- Sidebar: Projects -->
  <div class="sidebar">
    <div class="sidebar-label">المشاريع</div>
    <button class="project-item active" onclick="filterProject('all')">
      <div class="project-dot" style="background:#5b4fcf"></div>
      الكل
      <span class="project-count" id="count-all">0</span>
    </button>
    <button class="project-item" onclick="filterProject('الأرض')">
      <div class="project-dot" style="background:#1d9e75"></div>
      الأرض
      <span class="project-count" id="count-الأرض">0</span>
    </button>
    <button class="project-item" onclick="filterProject('عوالم')">
      <div class="project-dot" style="background:#378add"></div>
      عوالم
      <span class="project-count" id="count-عوالم">0</span>
    </button>
    <button class="project-item" onclick="filterProject('بنك المعلومات')">
      <div class="project-dot" style="background:#d85a30"></div>
      بنك المعلومات
      <span class="project-count" id="count-بنك المعلومات">0</span>
    </button>
    <button class="project-item" onclick="filterProject('Konkan')">
      <div class="project-dot" style="background:#ba7517"></div>
      Konkan
      <span class="project-count" id="count-Konkan">0</span>
    </button>
    <button class="project-item" onclick="filterProject('ULTRAS HUB')">
      <div class="project-dot" style="background:#993556"></div>
      ULTRAS HUB
      <span class="project-count" id="count-ULTRAS HUB">0</span>
    </button>

    <div class="sidebar-label" style="margin-top:12px">أخرى</div>
    <button class="project-item" onclick="filterProject('شخصي')">
      <div class="project-dot" style="background:#888780"></div>
      شخصي
      <span class="project-count" id="count-شخصي">0</span>
    </button>
  </div>

  <!-- Main: Stats + Tasks -->
  <div class="main">
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">إجمالي المهام</div>
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-sub">في كل المشاريع</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">مكتملة</div>
        <div class="stat-value" style="color:var(--success)" id="stat-done">0</div>
        <div class="stat-sub" id="stat-pct">0%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">عالية الأولوية</div>
        <div class="stat-value" style="color:var(--danger)" id="stat-high">0</div>
        <div class="stat-sub">تحتاج انتباه</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">متبقية</div>
        <div class="stat-value" id="stat-pending">0</div>
        <div class="stat-sub">غير مكتملة</div>
      </div>
    </div>

    <div class="tasks-area">
      <div class="tasks-header">
        <div class="tasks-title" id="tasks-title">كل المهام</div>
        <button class="add-btn" onclick="toggleForm()">+ إضافة مهمة</button>
      </div>

      <div class="add-form" id="add-form">
        <input type="text" id="task-input" placeholder="اكتب المهمة..." />
        <div class="form-row">
          <select id="task-project">
            <option value="الأرض">الأرض</option>
            <option value="عوالم">عوالم</option>
            <option value="بنك المعلومات">بنك المعلومات</option>
            <option value="Konkan">Konkan</option>
            <option value="ULTRAS HUB">ULTRAS HUB</option>
            <option value="شخصي">شخصي</option>
          </select>
          <select id="task-priority">
            <option value="high">عالية</option>
            <option value="mid">متوسطة</option>
            <option value="low">منخفضة</option>
          </select>
        </div>
        <div class="form-btns">
          <button class="btn-cancel" onclick="toggleForm()">إلغاء</button>
          <button class="btn-save" onclick="addTask()">حفظ</button>
        </div>
      </div>

      <div id="tasks-list"></div>
    </div>
  </div>

  <!-- Chat Panel -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="ai-dot"></div>
      المساعد الذكي
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="msg msg-ai">أهلاً أبو أمجد! أنا على دراية بمشاريعك كلها. كيف أقدر أساعدك اليوم؟</div>
    </div>
    <div class="quick-prompts">
      <button class="quick-btn" onclick="quickAsk('ما هي أهم مهام اليوم؟')">ما أهم مهام اليوم؟</button>
      <button class="quick-btn" onclick="quickAsk('ما آخر تحديثات مشروع الأرض؟')">آخر تحديثات الأرض</button>
      <button class="quick-btn" onclick="quickAsk('رتب مهامي حسب الأولوية')">رتب مهامي</button>
    </div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="اسأل عن مشاريعك..." rows="1"
        onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMsg()}"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>

</div>

<script>
const API_KEY = localStorage.getItem('claude_key') || '';

const PROJECTS_INFO = `
أنت مساعد شخصي لأبو أمجد، مطور عربي مستقل يعمل على المشاريع التالية:
1. الأرض: لعبة ترفيهية تنافسية متعددة اللاعبين (React + FastAPI + MongoDB) على Vercel و Railway. بنك أسئلة يتجاوز 5800 سؤال.
2. عوالم: تطبيق اجتماعي مثل Discord (Firebase + Agora) على GitHub Pages.
3. بنك المعلومات: لعبة أسئلة وأجوبة (Firebase + WebRTC) على Firebase Hosting.
4. Konkan: حاسبة لعبة الكونكان (React Native + Expo) على GitHub Pages.
5. ULTRAS HUB: منصة كرة قدم PWA متكاملة في عوالم مع Cloudflare Worker.
أجب بالعربية بشكل مختصر وعملي. أنت تعرف تفاصيل هذه المشاريع جيداً.
`;

let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
if (tasks.length === 0) {
  tasks = [
    { id: 1, title: 'إصلاح لغز أكمل الجملة', project: 'بنك المعلومات', priority: 'high', done: false },
    { id: 2, title: 'نقل metadata الفئات السبع إلى EXTRA_CATEGORIES', project: 'الأرض', priority: 'high', done: false },
    { id: 3, title: 'إصلاح bug الـ #contentArea', project: 'عوالم', priority: 'mid', done: false },
    { id: 4, title: 'اختبار Agora بعد تغيير الشهادة', project: 'الأرض', priority: 'mid', done: false },
    { id: 5, title: 'تحديث صور الأسئلة من Cloudinary', project: 'بنك المعلومات', priority: 'mid', done: false },
    { id: 6, title: 'إضافة ألوان اللاعبين الجديدة', project: 'Konkan', priority: 'low', done: true },
    { id: 7, title: 'تجربة قنوات يوتيوب الـ 13 الجديدة', project: 'ULTRAS HUB', priority: 'low', done: false },
  ];
  saveTasks();
}

let currentFilter = 'all';
let chatHistory = [];

function saveTasks() {
  localStorage.setItem('tasks', JSON.stringify(tasks));
}

function renderTasks() {
  const list = document.getElementById('tasks-list');
  const filtered = currentFilter === 'all' ? tasks : tasks.filter(t => t.project === currentFilter);

  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text2);padding:40px 0;font-size:13px">لا توجد مهام</div>';
    return;
  }

  list.innerHTML = filtered.map(t => `
    <div class="task-item" id="task-${t.id}">
      <div class="task-check ${t.done ? 'done' : ''}" onclick="toggleTask(${t.id})">${t.done ? '✓' : ''}</div>
      <div class="task-content">
        <div class="task-title ${t.done ? 'done' : ''}">${t.title}</div>
        <div class="task-meta">
          <span class="tag tag-project">${t.project}</span>
          <span class="tag ${t.priority === 'high' ? 'tag-high' : t.priority === 'mid' ? 'tag-mid' : 'tag-low'}">
            ${t.priority === 'high' ? 'عالية' : t.priority === 'mid' ? 'متوسطة' : 'منخفضة'}
          </span>
        </div>
      </div>
      <div onclick="deleteTask(${t.id})" style="font-size:16px;color:var(--text2);cursor:pointer;padding:4px;opacity:0.5">✕</div>
    </div>
  `).join('');
}

function updateStats() {
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const high = tasks.filter(t => t.priority === 'high' && !t.done).length;
  const pending = total - done;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-pct').textContent = total ? Math.round(done/total*100) + '%' : '0%';
  document.getElementById('stat-high').textContent = high;
  document.getElementById('stat-pending').textContent = pending;

  const projects = ['الأرض','عوالم','بنك المعلومات','Konkan','ULTRAS HUB','شخصي'];
  projects.forEach(p => {
    const el = document.getElementById('count-' + p);
    if (el) el.textContent = tasks.filter(t => t.project === p && !t.done).length;
  });
  const allEl = document.getElementById('count-all');
  if (allEl) allEl.textContent = tasks.filter(t => !t.done).length;
}

function toggleTask(id) {
  tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
  saveTasks(); renderTasks(); updateStats();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks(); renderTasks(); updateStats();
}

function filterProject(p) {
  currentFilter = p;
  document.querySelectorAll('.project-item').forEach(el => el.classList.remove('active'));
  event.target.closest('.project-item').classList.add('active');
  document.getElementById('tasks-title').textContent = p === 'all' ? 'كل المهام' : p;
  renderTasks();
}

function toggleForm() {
  const f = document.getElementById('add-form');
  f.classList.toggle('visible');
  if (f.classList.contains('visible')) document.getElementById('task-input').focus();
}

function addTask() {
  const title = document.getElementById('task-input').value.trim();
  if (!title) return;
  tasks.unshift({
    id: Date.now(),
    title,
    project: document.getElementById('task-project').value,
    priority: document.getElementById('task-priority').value,
    done: false
  });
  document.getElementById('task-input').value = '';
  document.getElementById('add-form').classList.remove('visible');
  saveTasks(); renderTasks(); updateStats();
}

function appendMsg(text, type) {
  const el = document.createElement('div');
  el.className = 'msg msg-' + type;
  el.textContent = text;
  const msgs = document.getElementById('chat-messages');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  appendMsg(text, 'user');

  chatHistory.push({ role: 'user', content: text });

  const thinking = appendMsg('...', 'thinking');
  document.getElementById('send-btn').disabled = true;

  const tasksSummary = `المهام الحالية: ${tasks.map(t => `${t.title} (${t.project}, ${t.done ? 'مكتملة' : 'معلقة'})`).join(' | ')}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5',
          max_tokens: 1024,
          system: PROJECTS_INFO + '\n' + tasksSummary,
          messages: chatHistory
        })
      });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'لم أتمكن من الرد، حاول مرة أخرى.';
    thinking.remove();
    appendMsg(reply, 'ai');
    chatHistory.push({ role: 'assistant', content: reply });
  } catch (e) {
    thinking.textContent = 'خطأ: ' + e.message;
  }

  document.getElementById('send-btn').disabled = false;
}

function quickAsk(q) {
  document.getElementById('chat-input').value = q;
  sendMsg();
}

document.getElementById('date-badge').textContent = new Date().toLocaleDateString('ar-SA', { weekday: 'long', day: 'numeric', month: 'long' });

if (!API_KEY) {
  const key = prompt('أدخل مفتاح Claude API');
  if (key) { localStorage.setItem('claude_key', key); location.reload(); }
}

renderTasks();
updateStats();
</script>

    <textarea class="fab-input" id="fab-input" placeholder="اسأل..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendFab()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="fab-send" onclick="sendFab()">↑</button>
  </div>

<script>
let fabHistory = [];

function toggleFab() {
  const panel = document.getElementById('fab-panel');
  const btn = document.getElementById('fab');
  panel.classList.toggle('visible');
  btn.classList.toggle('open');
  btn.textContent = panel.classList.contains('visible') ? '✕' : '🤖';
  if (panel.classList.contains('visible')) document.getElementById('fab-input').focus();
}

function appendFabMsg(text, type) {
  const el = document.createElement('div');
  el.className = 'msg msg-' + type;
  el.style.fontSize = '12px';
  el.textContent = text;
  const msgs = document.getElementById('fab-messages');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

async function sendFab() {
  const input = document.getElementById('fab-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  appendFabMsg(text, 'user');
  fabHistory.push({ role: 'user', content: text });
  const thinking = appendFabMsg('...', 'thinking');
  const tasksSummary = `المهام: ${tasks.map(t=>`${t.title}(${t.project},${t.done?'✓':'○'})`).join(' | ')}`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 1024,
        system: PROJECTS_INFO + '\n' + tasksSummary,
        messages: fabHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'حاول مرة أخرى.';
    thinking.remove();
    appendFabMsg(reply, 'ai');
    fabHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    thinking.textContent = 'خطأ في الاتصال.';
  }
}
</script>
