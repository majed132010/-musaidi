<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#7c6ef5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="مساعدي">
<title>مساعدي — أبو أمجد</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d12;
  --bg2: #13131c;
  --bg3: #1a1a26;
  --bg4: #222233;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e6f0;
  --text2: #8b89a0;
  --text3: #5a5870;
  --accent: #7c6ef5;
  --accent2: #9d91f7;
  --accent-bg: rgba(124,110,245,0.12);
  --accent-border: rgba(124,110,245,0.3);
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.1);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.1);
  --radius: 10px;
  --sidebar-w: 240px;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

/* ── Header ── */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  backdrop-filter: blur(10px);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.menu-btn {
  width: 34px; height: 34px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}
.menu-btn:hover { background: var(--bg3); color: var(--text); }
.logo { display: flex; align-items: center; gap: 8px; }
.logo-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #7c6ef5, #a78bfa);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.logo-text { font-size: 15px; font-weight: 600; color: var(--text); }
.header-right { display: flex; align-items: center; gap: 8px; }
.date-badge {
  font-size: 11px;
  color: var(--text2);
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 20px;
}
.view-tabs { display: flex; gap: 2px; background: var(--bg3); padding: 3px; border-radius: 9px; border: 1px solid var(--border); }
.view-tab {
  padding: 4px 12px;
  border-radius: 7px;
  font-size: 12px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text2);
  transition: all 0.15s;
}
.view-tab.active { background: var(--accent); color: white; }

/* ── App Shell ── */
.app-shell {
  display: flex;
  flex: 1;
  height: calc(100vh - 52px);
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.25s ease, opacity 0.25s ease;
  flex-shrink: 0;
}
.sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; }
.sidebar-inner { width: var(--sidebar-w); display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding: 12px 8px; }
.sidebar-section { margin-bottom: 4px; }
.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 8px 4px;
}
.proj-btn {
  width: 100%;
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px;
  border-radius: 8px;
  border: none;
  background: none;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  text-align: right;
  transition: all 0.15s;
}
.proj-btn:hover { background: var(--bg3); color: var(--text); }
.proj-btn.active { background: var(--accent-bg); color: var(--accent2); border: 1px solid var(--accent-border); }
.proj-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.proj-count {
  margin-right: auto;
  font-size: 10px;
  background: var(--bg4);
  color: var(--text3);
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}
.proj-btn.active .proj-count { background: var(--accent-bg); color: var(--accent2); }

/* ── Main ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── View ── */
.view { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.view.active { display: flex; }

/* ─── TASKS VIEW ─── */
.tasks-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 13px;
}
.stat-label { font-size: 10px; color: var(--text3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-value { font-size: 20px; font-weight: 600; }
.stat-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

.tasks-container { flex: 1; overflow-y: auto; padding: 14px; }
.tasks-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.tasks-title { font-size: 13px; font-weight: 600; color: var(--text2); }
.add-btn {
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.add-btn:hover { background: var(--bg4); color: var(--text); border-color: var(--accent-border); }

.add-form {
  background: var(--bg2);
  border: 1px solid var(--accent-border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 10px;
  display: none;
}
.add-form.visible { display: block; }
.add-form input, .add-form select {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--border2);
  border-radius: 7px;
  font-size: 12px;
  font-family: inherit;
  background: var(--bg3);
  color: var(--text);
  margin-bottom: 7px;
  outline: none;
  transition: border-color 0.15s;
}
.add-form input:focus, .add-form select:focus { border-color: var(--accent); }
.add-form select option { background: var(--bg3); }
.form-row { display: flex; gap: 7px; }
.form-row select { flex: 1; }
.form-btns { display: flex; gap: 7px; justify-content: flex-end; margin-top: 4px; }
.btn-save { padding: 6px 14px; background: var(--accent); color: white; border: none; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: inherit; }
.btn-cancel { padding: 6px 10px; background: none; border: 1px solid var(--border2); border-radius: 7px; font-size: 12px; cursor: pointer; font-family: inherit; color: var(--text2); }

.task-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex;
  align-items: flex-start;
  gap: 9px;
  transition: border-color 0.15s;
}
.task-item:hover { border-color: var(--border2); }
.task-check {
  width: 17px; height: 17px;
  border: 1.5px solid var(--border2);
  border-radius: 5px;
  flex-shrink: 0;
  margin-top: 1px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  transition: all 0.15s;
}
.task-check.done { background: var(--green); border-color: var(--green); color: #0d0d12; }
.task-content { flex: 1; min-width: 0; }
.task-title { font-size: 13px; font-weight: 500; margin-bottom: 5px; line-height: 1.4; }
.task-title.done { text-decoration: line-through; color: var(--text3); font-weight: 400; }
.task-meta { display: flex; gap: 5px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.tag-high { background: var(--red-bg); color: var(--red); }
.tag-mid { background: var(--amber-bg); color: var(--amber); }
.tag-low { background: var(--green-bg); color: var(--green); }
.tag-project { background: var(--accent-bg); color: var(--accent2); }
.task-del { font-size: 14px; color: var(--text3); cursor: pointer; padding: 2px 4px; opacity: 0; transition: opacity 0.15s; }
.task-item:hover .task-del { opacity: 1; }

/* ─── CHAT VIEW ─── */
.chat-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.chat-welcome {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}
.chat-welcome-icon {
  font-size: 48px;
  margin-bottom: 12px;
  display: block;
}
.chat-welcome h2 { font-size: 18px; color: var(--text2); font-weight: 500; margin-bottom: 6px; }
.chat-welcome p { font-size: 13px; line-height: 1.6; }
.chat-suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
.suggestion-btn {
  font-size: 12px;
  padding: 7px 13px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.suggestion-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--accent-border); }

.msg { max-width: 72%; display: flex; flex-direction: column; gap: 4px; }
.msg-user { align-self: flex-start; }
.msg-ai { align-self: flex-end; }
.msg-bubble {
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 13.5px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg-user .msg-bubble {
  background: var(--accent);
  color: white;
  border-radius: 14px 14px 4px 14px;
}
.msg-ai .msg-bubble {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 14px 14px 14px 4px;
}
.msg-thinking .msg-bubble {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text3);
  font-style: italic;
  border-radius: 14px 14px 14px 4px;
}
.msg-time { font-size: 10px; color: var(--text3); padding: 0 4px; }
.msg-user .msg-time { text-align: right; }

.chat-input-area {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.chat-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 13.5px;
  font-family: inherit;
  color: var(--text);
  resize: none;
  outline: none;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color 0.15s;
}
.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--text3); }
.chat-send {
  width: 38px; height: 38px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.chat-send:hover { background: var(--accent2); }
.chat-send:disabled { opacity: 0.4; cursor: default; }

/* ── Typing indicator ── */
.typing-dots { display: flex; gap: 4px; padding: 4px 0; }
.typing-dots span {
  width: 6px; height: 6px;
  background: var(--text3);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

/* ── Mobile ── */
@media (max-width: 700px) {
  .sidebar { display: none; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .msg { max-width: 88%; }
  .view-tabs { display: none; }
}
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="header-left">
    <button class="menu-btn" onclick="toggleSidebar()" title="القائمة">☰</button>
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <span class="logo-text">مساعدي</span>
    </div>
  </div>
  <div class="header-right">
    <div class="view-tabs">
      <button class="view-tab active" onclick="switchView('tasks', this)">المهام</button>
      <button class="view-tab" onclick="switchView('chat', this)">الدردشة</button>
    </div>
    <div class="date-badge" id="date-badge"></div>
  </div>
</div>

<!-- ── App Shell ── -->
<div class="app-shell">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-section">
        <div class="sidebar-label">المشاريع</div>
        <button class="proj-btn active" onclick="filterProject('all', this)">
          <div class="proj-dot" style="background:#7c6ef5"></div>
          الكل
          <span class="proj-count" id="count-all">0</span>
        </button>
        <button class="proj-btn" onclick="filterProject('الأرض', this)">
          <div class="proj-dot" style="background:#34d399"></div>
          الأرض
          <span class="proj-count" id="count-الأرض">0</span>
        </button>
        <button class="proj-btn" onclick="filterProject('عوالم', this)">
          <div class="proj-dot" style="background:#60a5fa"></div>
          عوالم
          <span class="proj-count" id="count-عوالم">0</span>
        </button>
        <button class="proj-btn" onclick="filterProject('بنك المعلومات', this)">
          <div class="proj-dot" style="background:#fb923c"></div>
          بنك المعلومات
          <span class="proj-count" id="count-بنك المعلومات">0</span>
        </button>
        <button class="proj-btn" onclick="filterProject('Konkan', this)">
          <div class="proj-dot" style="background:#fbbf24"></div>
          Konkan
          <span class="proj-count" id="count-Konkan">0</span>
        </button>
        <button class="proj-btn" onclick="filterProject('ULTRAS HUB', this)">
          <div class="proj-dot" style="background:#f472b6"></div>
          ULTRAS HUB
          <span class="proj-count" id="count-ULTRAS HUB">0</span>
        </button>
        <button class="proj-btn" onclick="filterProject('مساعدي', this)">
          <div class="proj-dot" style="background:#a78bfa"></div>
          مساعدي
          <span class="proj-count" id="count-مساعدي">0</span>
        </button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">أخرى</div>
        <button class="proj-btn" onclick="filterProject('شخصي', this)">
          <div class="proj-dot" style="background:#6b7280"></div>
          شخصي
          <span class="proj-count" id="count-شخصي">0</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- TASKS VIEW -->
    <div class="view tasks-view active" id="view-tasks">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">إجمالي</div>
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-sub">المهام</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">مكتملة</div>
          <div class="stat-value" style="color:var(--green)" id="stat-done">0</div>
          <div class="stat-sub" id="stat-pct">0%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">عالية</div>
          <div class="stat-value" style="color:var(--red)" id="stat-high">0</div>
          <div class="stat-sub">الأولوية</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">متبقية</div>
          <div class="stat-value" id="stat-pending">0</div>
          <div class="stat-sub">غير مكتملة</div>
        </div>
      </div>
      <div class="tasks-container">
        <div class="tasks-header">
          <div class="tasks-title" id="tasks-title">كل المهام</div>
          <button class="add-btn" onclick="toggleForm()">+ مهمة</button>
        </div>
        <div class="add-form" id="add-form">
          <input type="text" id="task-input" placeholder="اكتب المهمة..." />
          <div class="form-row">
            <select id="task-project">
              <option value="الأرض">الأرض</option>
              <option value="عوالم">عوالم</option>
              <option value="بنك المعلومات">بنك المعلومات</option>
              <option value="Konkan">Konkan</option>
              <option value="ULTRAS HUB">ULTRAS HUB</option>
              <option value="مساعدي">مساعدي</option>
              <option value="شخصي">شخصي</option>
            </select>
            <select id="task-priority">
              <option value="high">عالية</option>
              <option value="mid">متوسطة</option>
              <option value="low">منخفضة</option>
            </select>
          </div>
          <div class="form-btns">
            <button class="btn-cancel" onclick="toggleForm()">إلغاء</button>
            <button class="btn-save" onclick="addTask()">حفظ</button>
          </div>
        </div>
        <div id="tasks-list"></div>
      </div>
    </div>

    <!-- CHAT VIEW -->
    <div class="view chat-view" id="view-chat">
      <div class="chat-messages" id="chat-messages">
        <div class="chat-welcome">
          <span class="chat-welcome-icon">✦</span>
          <h2>مرحباً أبو أمجد</h2>
          <p>كيف أقدر أساعدك اليوم؟</p>
          <div class="chat-suggestions">
            <button class="suggestion-btn" onclick="sendSuggestion('ما هي أولويات اليوم؟')">أولويات اليوم</button>
            <button class="suggestion-btn" onclick="sendSuggestion('ما آخر تحديث على مشروع الأرض؟')">آخر تحديثات الأرض</button>
            <button class="suggestion-btn" onclick="sendSuggestion('ساعدني في حل مشكلة تقنية')">مشكلة تقنية</button>
            <button class="suggestion-btn" onclick="sendSuggestion('كم عدد المهام المتبقية؟')">المهام المتبقية</button>
          </div>
        </div>
      </div>
      <div class="chat-input-area">
        <textarea class="chat-input" id="chat-input" placeholder="اكتب رسالة..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
        <button class="chat-send" id="chat-send-btn" onclick="sendChat()">↑</button>
      </div>
    </div>

  </div>
</div>

<script>
const PROJECTS_INFO = `أنت مساعد شخصي لأبو أمجد، مطور عربي مستقل يعمل على:
1. الأرض: لعبة تنافسية (React+FastAPI+MongoDB) - Vercel+Railway - 5800+ سؤال
2. عوالم: تطبيق اجتماعي Discord-like (Firebase+Agora) - GitHub Pages
3. بنك المعلومات: لعبة أسئلة وأجوبة (Firebase+WebRTC)
4. Konkan: حاسبة الكونكان (React Native+Expo)
5. ULTRAS HUB: منصة كرة قدم PWA مع Cloudflare Worker
6. مساعدي: هذا التطبيق (مدير مهام + مساعد ذكي)
أجب بالعربية بشكل مختصر وعملي. تعرف تفاصيل هذه المشاريع جيداً.`;

let API_KEY = localStorage.getItem('claude_key') || '';
let tasks = JSON.parse(localStorage.getItem('musaidi_tasks') || '[]');
let chatHistory = [];
let currentFilter = 'all';
let sidebarOpen = true;

if (tasks.length === 0) {
  tasks = [
    { id: 1, title: 'نقل metadata الفئات السبع إلى EXTRA_CATEGORIES', project: 'الأرض', priority: 'high', done: false },
    { id: 2, title: 'إصلاح bug الـ #contentArea في عوالم', project: 'عوالم', priority: 'mid', done: false },
    { id: 3, title: 'اختبار Agora بعد تغيير الشهادة', project: 'الأرض', priority: 'mid', done: false },
    { id: 4, title: 'تجربة قنوات يوتيوب الـ 13 الجديدة', project: 'ULTRAS HUB', priority: 'low', done: false },
    { id: 5, title: 'واجهة مساعدي الجديدة — المرحلة الأولى', project: 'مساعدي', priority: 'high', done: true },
  ];
  saveTasks();
}

function saveTasks() { localStorage.setItem('musaidi_tasks', JSON.stringify(tasks)); }

function renderTasks() {
  const list = document.getElementById('tasks-list');
  const filtered = currentFilter === 'all' ? tasks : tasks.filter(t => t.project === currentFilter);
  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text3);padding:40px;font-size:13px">لا توجد مهام</div>';
    return;
  }
  list.innerHTML = filtered.map(t => `
    <div class="task-item">
      <div class="task-check ${t.done?'done':''}" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div>
      <div class="task-content">
        <div class="task-title ${t.done?'done':''}">${t.title}</div>
        <div class="task-meta">
          <span class="tag tag-project">${t.project}</span>
          <span class="tag ${t.priority==='high'?'tag-high':t.priority==='mid'?'tag-mid':'tag-low'}">${t.priority==='high'?'عالية':t.priority==='mid'?'متوسطة':'منخفضة'}</span>
        </div>
      </div>
      <div class="task-del" onclick="deleteTask(${t.id})">✕</div>
    </div>
  `).join('');
}

function updateStats() {
  const total = tasks.length;
  const done = tasks.filter(t=>t.done).length;
  const high = tasks.filter(t=>t.priority==='high'&&!t.done).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-pct').textContent = total ? Math.round(done/total*100)+'%' : '0%';
  document.getElementById('stat-high').textContent = high;
  document.getElementById('stat-pending').textContent = total - done;
  const projs = ['الأرض','عوالم','بنك المعلومات','Konkan','ULTRAS HUB','مساعدي','شخصي'];
  projs.forEach(p => {
    const el = document.getElementById('count-'+p);
    if (el) el.textContent = tasks.filter(t=>t.project===p&&!t.done).length;
  });
  const allEl = document.getElementById('count-all');
  if (allEl) allEl.textContent = tasks.filter(t=>!t.done).length;
}

function toggleTask(id) {
  tasks = tasks.map(t => t.id===id ? {...t, done:!t.done} : t);
  saveTasks(); renderTasks(); updateStats();
}
function deleteTask(id) {
  tasks = tasks.filter(t => t.id!==id);
  saveTasks(); renderTasks(); updateStats();
}
function filterProject(p, btn) {
  currentFilter = p;
  document.querySelectorAll('.proj-btn').forEach(el => el.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tasks-title').textContent = p==='all' ? 'كل المهام' : p;
  renderTasks();
}
function toggleForm() {
  const f = document.getElementById('add-form');
  f.classList.toggle('visible');
  if (f.classList.contains('visible')) document.getElementById('task-input').focus();
}
function addTask() {
  const title = document.getElementById('task-input').value.trim();
  if (!title) return;
  tasks.unshift({ id: Date.now(), title, project: document.getElementById('task-project').value, priority: document.getElementById('task-priority').value, done: false });
  document.getElementById('task-input').value = '';
  document.getElementById('add-form').classList.remove('visible');
  saveTasks(); renderTasks(); updateStats();
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
}

function switchView(v, btn) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.view-tab').forEach(el => el.classList.remove('active'));
  btn.classList.add('active');
}

/* ── Chat ── */
function appendMsg(text, type) {
  const welcome = document.querySelector('.chat-welcome');
  if (welcome) welcome.remove();
  const msgs = document.getElementById('chat-messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-' + (type==='user'?'user':'ai') + (type==='thinking'?' msg-thinking':'');
  const now = new Date().toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit'});
  wrap.innerHTML = `<div class="msg-bubble">${text}</div><div class="msg-time">${now}</div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

function sendSuggestion(text) {
  switchView('chat', document.querySelectorAll('.view-tab')[1]);
  document.getElementById('chat-input').value = text;
  sendChat();
}

async function sendChat() {
  if (!API_KEY) {
    const key = prompt('أدخل مفتاح Claude API:');
    if (key) { localStorage.setItem('claude_key', key); API_KEY = key; } else return;
  }
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  appendMsg(text, 'user');
  chatHistory.push({ role: 'user', content: text });
  const btn = document.getElementById('chat-send-btn');
  btn.disabled = true;
  const thinking = appendMsg('<div class="typing-dots"><span></span><span></span><span></span></div>', 'thinking');
  const tasksSummary = `المهام الحالية: ${tasks.map(t=>`${t.title}(${t.project},${t.done?'✓':'○'})`).join(' | ')}`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 1024,
        system: PROJECTS_INFO + '\n' + tasksSummary,
        messages: chatHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'حاول مرة أخرى.';
    thinking.remove();
    appendMsg(reply, 'ai');
    chatHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    thinking.querySelector('.msg-bubble').textContent = 'خطأ في الاتصال.';
  }
  btn.disabled = false;
}

document.getElementById('date-badge').textContent = new Date().toLocaleDateString('ar-SA', { weekday: 'long', day: 'numeric', month: 'long' });

if (!API_KEY) {
  const key = prompt('أدخل مفتاح Claude API:');
  if (key) { localStorage.setItem('claude_key', key); API_KEY = key; }
}

renderTasks();
updateStats();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
