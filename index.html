<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f5c842">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="مساعدي">
<title>مساعدي — أبو أمجد</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #f5c842;
  --gold2: #ffd95a;
  --gold3: #ffe98a;
  --gold-dark: #c9a020;
  --black: #0a0a0a;
  --black2: #111111;
  --black3: #1a1a1a;
  --black4: #242424;
  --text: #0a0a0a;
  --text2: #2a2a2a;
  --text3: #555555;
  --border: rgba(245,200,66,0.2);
  --border2: rgba(245,200,66,0.4);
  --radius: 12px;
  --nav-h: 64px;
  --header-h: 52px;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--black); color: var(--gold); display: flex; flex-direction: column; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 4px; }

/* ── Header ── */
.header {
  height: var(--header-h);
  background: var(--black2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  flex-shrink: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 32px; height: 32px;
  background: var(--gold);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.logo-text { font-size: 16px; font-weight: 700; color: var(--gold); }
.header-date { font-size: 11px; color: var(--gold-dark); background: var(--black3); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; }

/* ── Body ── */
.app-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* ── Views ── */
.view { display: none; flex: 1; flex-direction: column; overflow: hidden; height: 100%; }
.view.active { display: flex; }

/* ── Bottom Nav ── */
.bottom-nav {
  height: var(--nav-h);
  background: var(--black2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  flex-shrink: 0;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  border: none;
  background: none;
  color: #444;
  cursor: pointer;
  padding: 8px 0;
  transition: color 0.2s;
  font-family: inherit;
}
.nav-btn.active { color: var(--gold); }
.nav-icon { font-size: 22px; }
.nav-label { font-size: 10px; font-weight: 600; }
.nav-btn.active .nav-icon { filter: drop-shadow(0 0 6px rgba(245,200,66,0.6)); }

/* ── CHAT (الرئيسية) ── */
.chat-view { background: var(--black); }
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.chat-welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 10px;
  padding: 30px 20px;
}
.welcome-circle {
  width: 80px; height: 80px;
  background: var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  margin-bottom: 8px;
}
.welcome-title { font-size: 22px; font-weight: 700; color: var(--gold); }
.welcome-sub { font-size: 13px; color: #666; text-align: center; }
.suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
.sug-btn {
  font-size: 12px;
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--black3);
  color: var(--gold);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.sug-btn:hover, .sug-btn:active { background: var(--gold); color: var(--black); }

.msg { max-width: 80%; display: flex; flex-direction: column; gap: 3px; }
.msg-user { align-self: flex-start; }
.msg-ai { align-self: flex-end; }
.msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.msg-user .msg-bubble { background: var(--gold); color: var(--black); border-radius: 16px 16px 4px 16px; font-weight: 500; }
.msg-ai .msg-bubble { background: var(--black3); border: 1px solid var(--border); color: var(--gold); border-radius: 16px 16px 16px 4px; }
.msg-thinking .msg-bubble { background: var(--black3); border: 1px solid var(--border); color: #555; border-radius: 16px 16px 16px 4px; }
.msg-time { font-size: 10px; color: #444; padding: 0 4px; }
.msg-user .msg-time { text-align: right; }

.chat-input-area {
  padding: 10px 12px;
  background: var(--black2);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.chat-input {
  flex: 1;
  background: var(--black3);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 10px 16px;
  font-size: 14px;
  font-family: inherit;
  color: var(--gold);
  resize: none;
  outline: none;
  max-height: 100px;
  line-height: 1.5;
}
.chat-input::placeholder { color: #444; }
.chat-input:focus { border-color: var(--gold); }
.chat-send {
  width: 40px; height: 40px;
  background: var(--gold);
  border: none;
  border-radius: 50%;
  color: var(--black);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.chat-send:disabled { opacity: 0.4; }
.typing-dots { display: flex; gap: 4px; padding: 2px 0; }
.typing-dots span { width: 6px; height: 6px; background: var(--gold-dark); border-radius: 50%; animation: bounce 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* ── TASKS ── */
.tasks-view { background: var(--black); }
.stats-row { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; padding: 12px; flex-shrink: 0; }
.stat-card { background: var(--black2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.stat-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.stat-value { font-size: 24px; font-weight: 700; color: var(--gold); }
.stat-sub { font-size: 10px; color: #444; margin-top: 2px; }
.tasks-container { flex: 1; overflow-y: auto; padding: 0 12px 12px; }
.tasks-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 10px; }
.tasks-title { font-size: 13px; font-weight: 600; color: #555; }
.add-btn { font-size: 12px; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border2); background: var(--gold); color: var(--black); cursor: pointer; font-weight: 600; font-family: inherit; }
.add-form { background: var(--black2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; display: none; }
.add-form.visible { display: block; }
.add-form input, .add-form select { width: 100%; padding: 8px 12px; border: 1px solid var(--border2); border-radius: 8px; font-size: 13px; font-family: inherit; background: var(--black3); color: var(--gold); margin-bottom: 8px; outline: none; }
.add-form input:focus, .add-form select:focus { border-color: var(--gold); }
.add-form select option { background: var(--black3); }
.form-row { display: flex; gap: 7px; }
.form-row select { flex: 1; }
.form-btns { display: flex; gap: 7px; justify-content: flex-end; }
.btn-save { padding: 7px 16px; background: var(--gold); color: var(--black); border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-cancel { padding: 7px 12px; background: none; border: 1px solid var(--border2); border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; color: #555; }
.task-item { background: var(--black2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; }
.task-item:active { border-color: var(--gold); }
.task-check { width: 20px; height: 20px; border: 2px solid var(--border2); border-radius: 6px; flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all 0.15s; }
.task-check.done { background: var(--gold); border-color: var(--gold); color: var(--black); font-weight: 700; }
.task-content { flex: 1; }
.task-title { font-size: 13.5px; font-weight: 500; color: var(--gold); margin-bottom: 6px; line-height: 1.4; }
.task-title.done { text-decoration: line-through; color: #444; }
.task-meta { display: flex; gap: 5px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.tag-high { background: rgba(248,113,113,0.15); color: #f87171; }
.tag-mid { background: rgba(251,191,36,0.15); color: #fbbf24; }
.tag-low { background: rgba(52,211,153,0.15); color: #34d399; }
.tag-project { background: rgba(245,200,66,0.15); color: var(--gold); }
.task-del { font-size: 16px; color: #333; cursor: pointer; padding: 2px 4px; flex-shrink: 0; }

/* ── GMAIL ── */
.gmail-view { background: var(--black); }
.gmail-toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--border); background: var(--black2); flex-shrink: 0; flex-wrap: wrap; }
.gmail-btn { font-size: 12px; padding: 7px 12px; border-radius: 20px; border: 1px solid var(--border2); background: var(--black3); color: var(--gold); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.gmail-btn.primary { background: var(--gold); color: var(--black); border-color: var(--gold); font-weight: 600; }
.gmail-btn.danger { background: rgba(248,113,113,0.1); color: #f87171; border-color: rgba(248,113,113,0.3); }
.gmail-status { font-size: 11px; color: #444; margin-right: auto; }
.gmail-connected { color: #34d399; }
.emails-list { flex: 1; overflow-y: auto; }
.email-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; position: relative; }
.email-item:active { background: var(--black3); }
.email-item.unread { background: rgba(245,200,66,0.04); }
.email-check { width: 18px; height: 18px; border: 1.5px solid var(--border2); border-radius: 4px; flex-shrink: 0; margin-top: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.email-check.checked { background: var(--gold); border-color: var(--gold); color: var(--black); font-weight: 700; }
.email-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; color: var(--black); }
.email-content { flex: 1; min-width: 0; }
.email-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.email-from { font-size: 13px; font-weight: 600; color: var(--gold); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.email-item:not(.unread) .email-from { font-weight: 400; color: #555; }
.email-date { font-size: 10px; color: #444; flex-shrink: 0; }
.email-subject { font-size: 12px; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.email-item:not(.unread) .email-subject { color: #555; }
.email-snippet { font-size: 11px; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.email-unread-dot { width: 7px; height: 7px; background: var(--gold); border-radius: 50%; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); }

.email-detail { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--black); z-index: 200; display: none; flex-direction: column; }
.email-detail.visible { display: flex; }
.email-detail-header { padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--black2); flex-shrink: 0; }
.email-detail-back { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--gold); cursor: pointer; background: none; border: none; margin-bottom: 10px; font-family: inherit; }
.email-detail-subject { font-size: 16px; font-weight: 700; color: var(--gold); margin-bottom: 8px; line-height: 1.3; }
.email-detail-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.email-detail-from { font-size: 12px; color: #666; flex: 1; }
.email-detail-date { font-size: 11px; color: #444; }
.email-detail-actions { display: flex; gap: 6px; margin-top: 8px; }
.email-detail-body { flex: 1; overflow-y: auto; padding: 16px; font-size: 13.5px; line-height: 1.7; color: #888; }

.compose-modal { position: fixed; bottom: calc(var(--nav-h) + 8px); left: 12px; right: 12px; background: var(--black2); border: 1px solid var(--border2); border-radius: 16px; z-index: 300; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 -10px 40px rgba(245,200,66,0.1); }
.compose-modal.visible { display: flex; }
.compose-header { padding: 12px 16px; background: var(--gold); display: flex; align-items: center; justify-content: space-between; }
.compose-title { font-size: 14px; font-weight: 700; color: var(--black); }
.compose-close { background: none; border: none; color: var(--black); cursor: pointer; font-size: 20px; font-weight: 700; }
.compose-fields { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
.compose-field { display: flex; align-items: center; gap: 8px; }
.compose-field-label { font-size: 11px; color: #555; width: 32px; flex-shrink: 0; }
.compose-field input { flex: 1; background: none; border: none; outline: none; font-size: 13px; font-family: inherit; color: var(--gold); padding: 4px 0; }
.compose-field input::placeholder { color: #333; }
.compose-body { min-height: 120px; padding: 12px 14px; outline: none; font-size: 13px; font-family: inherit; color: var(--gold); line-height: 1.6; }
.compose-body:empty:before { content: attr(data-placeholder); color: #333; }
.compose-footer { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; gap: 10px; padding: 40px; }
.empty-state-icon { font-size: 48px; }
.empty-state p { font-size: 13px; text-align: center; color: #444; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <span class="logo-text">مساعدي</span>
  </div>
  <div class="header-date" id="date-badge"></div>
</div>

<!-- App Body -->
<div class="app-body">

  <!-- CHAT VIEW -->
  <div class="view chat-view active" id="view-chat">
    <div class="chat-messages" id="chat-messages">
      <div class="chat-welcome">
        <div class="welcome-circle">🤖</div>
        <div class="welcome-title">مرحباً أبو أمجد</div>
        <div class="welcome-sub">مساعدك الشخصي — اسألني أي شيء</div>
        <div class="suggestions">
          <button class="sug-btn" onclick="sendSug('ما أولويات اليوم؟')">أولويات اليوم</button>
          <button class="sug-btn" onclick="sendSug('آخر تحديثات الأرض؟')">تحديثات الأرض</button>
          <button class="sug-btn" onclick="sendSug('كم مهمة متبقية؟')">المهام المتبقية</button>
          <button class="sug-btn" onclick="sendSug('ساعدني في مشكلة تقنية')">مشكلة تقنية</button>
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="اكتب رسالة..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
      <button class="chat-send" id="chat-send-btn" onclick="sendChat()">↑</button>
    </div>
  </div>

  <!-- TASKS VIEW -->
  <div class="view tasks-view" id="view-tasks">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">إجمالي</div><div class="stat-value" id="stat-total">0</div><div class="stat-sub">المهام</div></div>
      <div class="stat-card"><div class="stat-label">مكتملة</div><div class="stat-value" id="stat-done">0</div><div class="stat-sub" id="stat-pct">0%</div></div>
      <div class="stat-card"><div class="stat-label">عالية الأولوية</div><div class="stat-value" id="stat-high">0</div><div class="stat-sub">تحتاج انتباه</div></div>
      <div class="stat-card"><div class="stat-label">متبقية</div><div class="stat-value" id="stat-pending">0</div><div class="stat-sub">غير مكتملة</div></div>
    </div>
    <div class="tasks-container">
      <div class="tasks-header">
        <div class="tasks-title">كل المهام</div>
        <button class="add-btn" onclick="toggleForm()">+ مهمة</button>
      </div>
      <div class="add-form" id="add-form">
        <input type="text" id="task-input" placeholder="اكتب المهمة..." />
        <div class="form-row">
          <select id="task-project">
            <option value="الأرض">الأرض</option>
            <option value="عوالم">عوالم</option>
            <option value="بنك المعلومات">بنك المعلومات</option>
            <option value="Konkan">Konkan</option>
            <option value="ULTRAS HUB">ULTRAS HUB</option>
            <option value="مساعدي">مساعدي</option>
            <option value="شخصي">شخصي</option>
          </select>
          <select id="task-priority">
            <option value="high">عالية</option>
            <option value="mid">متوسطة</option>
            <option value="low">منخفضة</option>
          </select>
        </div>
        <div class="form-btns">
          <button class="btn-cancel" onclick="toggleForm()">إلغاء</button>
          <button class="btn-save" onclick="addTask()">حفظ</button>
        </div>
      </div>
      <div id="tasks-list"></div>
    </div>
  </div>

  <!-- GMAIL VIEW -->
  <div class="view gmail-view" id="view-gmail" style="position:relative">
    <div class="gmail-toolbar">
      <button class="gmail-btn primary" id="gmail-auth-btn" onclick="gmailSignIn()">🔑 تسجيل الدخول</button>
      <button class="gmail-btn" id="gmail-refresh-btn" onclick="loadEmails()" style="display:none">🔄 تحديث</button>
      <button class="gmail-btn" id="gmail-compose-btn" onclick="openCompose()" style="display:none">✏️ إنشاء</button>
      <button class="gmail-btn danger" id="gmail-delete-btn" onclick="deleteSelected()" style="display:none">🗑️ حذف</button>
      <span class="gmail-status" id="gmail-status">غير مرتبط</span>
    </div>
    <div class="emails-list" id="emails-container">
      <div class="empty-state">
        <div class="empty-state-icon">📧</div>
        <p>سجّل دخولك لعرض رسائلك</p>
      </div>
    </div>
    <div class="email-detail" id="email-detail">
      <div class="email-detail-header">
        <button class="email-detail-back" onclick="closeEmailDetail()">← رجوع</button>
        <div class="email-detail-subject" id="detail-subject"></div>
        <div class="email-detail-meta">
          <div class="email-detail-from" id="detail-from"></div>
          <div class="email-detail-date" id="detail-date"></div>
        </div>
        <div class="email-detail-actions">
          <button class="gmail-btn" onclick="replyEmail()">↩️ رد</button>
          <button class="gmail-btn danger" onclick="deleteCurrentEmail()">🗑️ حذف</button>
        </div>
      </div>
      <div class="email-detail-body" id="detail-body"></div>
    </div>
  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchView('chat',this)">
    <span class="nav-icon">💬</span>
    <span class="nav-label">الدردشة</span>
  </button>
  <button class="nav-btn" onclick="switchView('tasks',this)">
    <span class="nav-icon">✅</span>
    <span class="nav-label">المهام</span>
  </button>
  <button class="nav-btn" onclick="switchView('gmail',this)">
    <span class="nav-icon">📧</span>
    <span class="nav-label">Gmail</span>
  </button>
</div>

<!-- Compose -->
<div class="compose-modal" id="compose-modal">
  <div class="compose-header">
    <span class="compose-title">رسالة جديدة</span>
    <button class="compose-close" onclick="closeCompose()">✕</button>
  </div>
  <div class="compose-fields">
    <div class="compose-field"><span class="compose-field-label">إلى</span><input type="email" id="compose-to" placeholder="example@gmail.com" /></div>
    <div class="compose-field"><span class="compose-field-label">موضوع</span><input type="text" id="compose-subject" placeholder="موضوع الرسالة" /></div>
  </div>
  <div class="compose-body" id="compose-body" contenteditable="true" data-placeholder="اكتب رسالتك..."></div>
  <div class="compose-footer">
    <button class="btn-cancel" onclick="closeCompose()">إلغاء</button>
    <button class="btn-save" onclick="sendEmail()">إرسال ✉️</button>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
const GOOGLE_CLIENT_ID = '498546452069-rptoquk5iio9699psetipnidvaac8g5t.apps.googleusercontent.com';
const GMAIL_SCOPES = 'https://www.googleapis.com/auth/gmail.modify';
const PROJECTS_INFO = `أنت مساعد شخصي لأبو أمجد، مطور عربي مستقل يعمل على:
1. الأرض: لعبة تنافسية (React+FastAPI+MongoDB) - 5800+ سؤال
2. عوالم: تطبيق اجتماعي Discord-like (Firebase+Agora)
3. بنك المعلومات: لعبة أسئلة وأجوبة (Firebase+WebRTC)
4. Konkan: حاسبة الكونكان (React Native+Expo)
5. ULTRAS HUB: منصة كرة قدم PWA مع Cloudflare Worker
6. مساعدي: مدير مهام + مساعد ذكي + Gmail
أجب بالعربية بشكل مختصر وعملي.`;

let API_KEY = localStorage.getItem('claude_key') || '';
let tasks = JSON.parse(localStorage.getItem('musaidi_tasks') || '[]');
let chatHistory = [];
let gmailToken = null;
let emails = [];
let selectedEmails = new Set();
let currentEmailId = null;

if (!tasks.length) {
  tasks = [
    { id:1, title:'نقل metadata الفئات السبع إلى EXTRA_CATEGORIES', project:'الأرض', priority:'high', done:false },
    { id:2, title:'إصلاح bug الـ #contentArea في عوالم', project:'عوالم', priority:'mid', done:false },
    { id:3, title:'اختبار Agora بعد تغيير الشهادة', project:'الأرض', priority:'mid', done:false },
    { id:4, title:'تجربة قنوات يوتيوب الـ 13 الجديدة', project:'ULTRAS HUB', priority:'low', done:false },
    { id:5, title:'ربط Gmail بمساعدي', project:'مساعدي', priority:'high', done:true },
  ];
  saveTasks();
}

function saveTasks() { localStorage.setItem('musaidi_tasks', JSON.stringify(tasks)); }

function renderTasks() {
  const list = document.getElementById('tasks-list');
  if (!tasks.length) { list.innerHTML='<div style="text-align:center;color:#333;padding:40px;font-size:13px">لا توجد مهام</div>'; return; }
  list.innerHTML = tasks.map(t=>`
    <div class="task-item">
      <div class="task-check ${t.done?'done':''}" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div>
      <div class="task-content">
        <div class="task-title ${t.done?'done':''}">${t.title}</div>
        <div class="task-meta">
          <span class="tag tag-project">${t.project}</span>
          <span class="tag ${t.priority==='high'?'tag-high':t.priority==='mid'?'tag-mid':'tag-low'}">${t.priority==='high'?'عالية':t.priority==='mid'?'متوسطة':'منخفضة'}</span>
        </div>
      </div>
      <div class="task-del" onclick="deleteTask(${t.id})">✕</div>
    </div>`).join('');
}

function updateStats() {
  const total=tasks.length, done=tasks.filter(t=>t.done).length, high=tasks.filter(t=>t.priority==='high'&&!t.done).length;
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-pct').textContent=total?Math.round(done/total*100)+'%':'0%';
  document.getElementById('stat-high').textContent=high;
  document.getElementById('stat-pending').textContent=total-done;
}

function toggleTask(id) { tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t); saveTasks(); renderTasks(); updateStats(); }
function deleteTask(id) { tasks=tasks.filter(t=>t.id!==id); saveTasks(); renderTasks(); updateStats(); }
function toggleForm() { const f=document.getElementById('add-form'); f.classList.toggle('visible'); if(f.classList.contains('visible')) document.getElementById('task-input').focus(); }
function addTask() {
  const title=document.getElementById('task-input').value.trim(); if(!title) return;
  tasks.unshift({id:Date.now(),title,project:document.getElementById('task-project').value,priority:document.getElementById('task-priority').value,done:false});
  document.getElementById('task-input').value=''; document.getElementById('add-form').classList.remove('visible');
  saveTasks(); renderTasks(); updateStats();
}

function switchView(v, btn) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  btn.classList.add('active');
}

/* Chat */
function appendMsg(text, type) {
  const welcome=document.querySelector('.chat-welcome'); if(welcome) welcome.remove();
  const msgs=document.getElementById('chat-messages');
  const wrap=document.createElement('div');
  wrap.className='msg msg-'+(type==='user'?'user':'ai')+(type==='thinking'?' msg-thinking':'');
  const now=new Date().toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});
  wrap.innerHTML=`<div class="msg-bubble">${text}</div><div class="msg-time">${now}</div>`;
  msgs.appendChild(wrap); msgs.scrollTop=msgs.scrollHeight; return wrap;
}
function sendSug(text) { document.getElementById('chat-input').value=text; sendChat(); }
async function sendChat() {
  if(!API_KEY){const k=prompt('أدخل مفتاح Claude API:');if(k){localStorage.setItem('claude_key',k);API_KEY=k;}else return;}
  const input=document.getElementById('chat-input'); const text=input.value.trim(); if(!text) return;
  input.value=''; input.style.height='auto'; appendMsg(text,'user'); chatHistory.push({role:'user',content:text});
  const btn=document.getElementById('chat-send-btn'); btn.disabled=true;
  const thinking=appendMsg('<div class="typing-dots"><span></span><span></span><span></span></div>','thinking');
  const tasksSummary=`المهام: ${tasks.map(t=>`${t.title}(${t.project},${t.done?'✓':'○'})`).join(' | ')}`;
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'x-api-key':API_KEY,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5',max_tokens:1024,system:PROJECTS_INFO+'\n'+tasksSummary,messages:chatHistory})});
    const data=await res.json(); const reply=data.content?.[0]?.text||'حاول مرة أخرى.';
    thinking.remove(); appendMsg(reply,'ai'); chatHistory.push({role:'assistant',content:reply});
  } catch(e){thinking.querySelector('.msg-bubble').textContent='خطأ في الاتصال.';}
  btn.disabled=false;
}

/* Gmail */
function gmailSignIn() {
  const client=google.accounts.oauth2.initTokenClient({client_id:GOOGLE_CLIENT_ID,scope:GMAIL_SCOPES,callback:(resp)=>{
    if(resp.access_token){
      gmailToken=resp.access_token;
      document.getElementById('gmail-auth-btn').style.display='none';
      document.getElementById('gmail-refresh-btn').style.display='';
      document.getElementById('gmail-compose-btn').style.display='';
      document.getElementById('gmail-status').innerHTML='<span class="gmail-connected">● متصل</span>';
      loadEmails();
    }
  }});
  client.requestAccessToken();
}
async function gmailFetch(url){const res=await fetch(url,{headers:{Authorization:'Bearer '+gmailToken}});return res.json();}
async function loadEmails(){
  if(!gmailToken) return;
  document.getElementById('emails-container').innerHTML='<div class="empty-state"><div class="empty-state-icon">⏳</div><p>جاري التحميل...</p></div>';
  try{
    const data=await gmailFetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=30&labelIds=INBOX');
    if(!data.messages){document.getElementById('emails-container').innerHTML='<div class="empty-state"><div class="empty-state-icon">📭</div><p>البريد فارغ</p></div>';return;}
    emails=await Promise.all(data.messages.map(m=>gmailFetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`)));
    renderEmails();
  }catch(e){document.getElementById('emails-container').innerHTML='<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>خطأ في التحميل</p></div>';}
}
const ACOLORS=['#f5c842','#34d399','#f87171','#60a5fa','#f472b6','#fb923c','#a78bfa'];
function aColor(s){let h=0;for(let c of s)h=(h*31+c.charCodeAt(0))&0xffffffff;return ACOLORS[Math.abs(h)%ACOLORS.length];}
function getH(msg,n){return msg.payload?.headers?.find(h=>h.name===n)?.value||'';}
function fDate(d){if(!d)return '';const dt=new Date(d),now=new Date();if(dt.toDateString()===now.toDateString())return dt.toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});return dt.toLocaleDateString('ar',{day:'numeric',month:'short'});}
function sName(from){return from.replace(/<.*>/,'').replace(/"/g,'').trim()||from.split('@')[0];}
function renderEmails(){
  selectedEmails.clear(); document.getElementById('gmail-delete-btn').style.display='none';
  const html=emails.map(msg=>{
    const from=getH(msg,'From'),subject=getH(msg,'Subject')||'(بلا موضوع)',date=fDate(getH(msg,'Date'));
    const name=sName(from),initial=name[0]?.toUpperCase()||'?',color=aColor(from);
    const isUnread=msg.labelIds?.includes('UNREAD');
    return `<div class="email-item ${isUnread?'unread':''}" onclick="openEmail('${msg.id}')">
      <div class="email-check" onclick="toggleSel(event,'${msg.id}',this)"></div>
      <div class="email-avatar" style="background:${color}">${initial}</div>
      <div class="email-content">
        <div class="email-header"><div class="email-from">${name}</div><div class="email-date">${date}</div></div>
        <div class="email-subject">${subject}</div>
        <div class="email-snippet">${msg.snippet||''}</div>
      </div>
      ${isUnread?'<div class="email-unread-dot"></div>':''}
    </div>`;
  }).join('');
  document.getElementById('emails-container').innerHTML=html||'<div class="empty-state"><div class="empty-state-icon">📭</div><p>لا توجد رسائل</p></div>';
}
function toggleSel(e,id,el){e.stopPropagation();if(selectedEmails.has(id)){selectedEmails.delete(id);el.classList.remove('checked');el.textContent='';}else{selectedEmails.add(id);el.classList.add('checked');el.textContent='✓';}document.getElementById('gmail-delete-btn').style.display=selectedEmails.size?'':'none';}
async function openEmail(id){
  currentEmailId=id;
  const full=await gmailFetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${id}?format=full`);
  const subject=full.payload?.headers?.find(h=>h.name==='Subject')?.value||'(بلا موضوع)';
  const from=full.payload?.headers?.find(h=>h.name==='From')?.value||'';
  const date=fDate(full.payload?.headers?.find(h=>h.name==='Date')?.value);
  let body='';
  const exBody=(part)=>{if(!part)return;if(part.mimeType==='text/plain'&&part.body?.data)body=atob(part.body.data.replace(/-/g,'+').replace(/_/g,'/'));else if(part.mimeType==='text/html'&&part.body?.data&&!body)body=atob(part.body.data.replace(/-/g,'+').replace(/_/g,'/'));if(part.parts)part.parts.forEach(exBody);};
  exBody(full.payload);
  document.getElementById('detail-subject').textContent=subject;
  document.getElementById('detail-from').textContent=from;
  document.getElementById('detail-date').textContent=date;
  const bodyEl=document.getElementById('detail-body');
  if(body.includes('<')){const iframe=document.createElement('iframe');iframe.srcdoc=body;iframe.style.cssText='width:100%;height:100%;border:none;background:white;border-radius:8px';bodyEl.innerHTML='';bodyEl.appendChild(iframe);}
  else bodyEl.textContent=body||full.snippet;
  document.getElementById('email-detail').classList.add('visible');
  if(full.labelIds?.includes('UNREAD'))await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${id}/modify`,{method:'POST',headers:{'Authorization':'Bearer '+gmailToken,'Content-Type':'application/json'},body:JSON.stringify({removeLabelIds:['UNREAD']})});
}
function closeEmailDetail(){document.getElementById('email-detail').classList.remove('visible');currentEmailId=null;}
async function deleteCurrentEmail(){if(!currentEmailId)return;await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${currentEmailId}/trash`,{method:'POST',headers:{Authorization:'Bearer '+gmailToken}});closeEmailDetail();emails=emails.filter(e=>e.id!==currentEmailId);renderEmails();}
async function deleteSelected(){if(!selectedEmails.size)return;await Promise.all([...selectedEmails].map(id=>fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${id}/trash`,{method:'POST',headers:{Authorization:'Bearer '+gmailToken}})));emails=emails.filter(e=>!selectedEmails.has(e.id));selectedEmails.clear();renderEmails();document.getElementById('gmail-delete-btn').style.display='none';}
function replyEmail(){const subj=document.getElementById('detail-subject').textContent,from=document.getElementById('detail-from').textContent,toEmail=from.match(/<(.+)>/)?.[1]||from;document.getElementById('compose-to').value=toEmail;document.getElementById('compose-subject').value='Re: '+subj;document.getElementById('compose-body').textContent='';document.getElementById('compose-modal').classList.add('visible');}
function openCompose(){document.getElementById('compose-to').value='';document.getElementById('compose-subject').value='';document.getElementById('compose-body').textContent='';document.getElementById('compose-modal').classList.add('visible');}
function closeCompose(){document.getElementById('compose-modal').classList.remove('visible');}
async function sendEmail(){
  const to=document.getElementById('compose-to').value.trim(),subject=document.getElementById('compose-subject').value.trim(),body=document.getElementById('compose-body').textContent.trim();
  if(!to||!subject||!body){alert('يرجى تعبئة جميع الحقول');return;}
  const msg=`To: ${to}\r\nSubject: =?UTF-8?B?${btoa(unescape(encodeURIComponent(subject)))}?=\r\nContent-Type: text/plain; charset=utf-8\r\n\r\n${body}`;
  const encoded=btoa(unescape(encodeURIComponent(msg))).replace(/\+/g,'-').replace(/\//g,'_');
  const res=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send',{method:'POST',headers:{'Authorization':'Bearer '+gmailToken,'Content-Type':'application/json'},body:JSON.stringify({raw:encoded})});
  if(res.ok){closeCompose();alert('✅ تم الإرسال!');}else{alert('❌ فشل الإرسال');}
}

document.getElementById('date-badge').textContent=new Date().toLocaleDateString('ar-SA',{weekday:'long',day:'numeric',month:'long'});
if(!API_KEY){const k=prompt('أدخل مفتاح Claude API:');if(k){localStorage.setItem('claude_key',k);API_KEY=k;}}
renderTasks(); updateStats();
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
